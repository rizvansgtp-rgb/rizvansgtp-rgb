<svg width="1200" height="380" viewBox="0 0 1200 380" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">Mohamed Rizvan Muthalif - Infrastructure Command Center</title>
<desc id="desc">Animated cyber blue GitHub profile banner for Microsoft 365, infrastructure, network security, POS and hospitality IT.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="380" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#020617"/>
    <stop offset="0.45" stop-color="#071B36"/>
    <stop offset="1" stop-color="#111827"/>
  </linearGradient>
  <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(265 80) rotate(90) scale(220 430)">
    <stop stop-color="#38BDF8" stop-opacity="0.55"/>
    <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(980 270) rotate(90) scale(180 380)">
    <stop stop-color="#8B5CF6" stop-opacity="0.45"/>
    <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
    <stop stop-color="#22D3EE"/>
    <stop offset="0.45" stop-color="#60A5FA"/>
    <stop offset="1" stop-color="#A78BFA"/>
  </linearGradient>
  <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
    <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M40 0H0V40" stroke="#1E3A5F" stroke-opacity="0.35" stroke-width="1"/>
  </pattern>
</defs>

<rect width="1200" height="380" rx="28" fill="url(#bg)"/>
<rect width="1200" height="380" rx="28" fill="url(#grid)" opacity="0.55"/>
<rect width="1200" height="380" rx="28" fill="url(#glow1)"/>
<rect width="1200" height="380" rx="28" fill="url(#glow2)"/>

<g opacity="0.65">
  <path d="M68 285 C210 225, 285 310, 430 240 S720 135, 845 188 S1040 256, 1130 176" stroke="url(#accent)" stroke-opacity="0.35" stroke-width="2"/>
  <path d="M95 126 C225 72, 356 170, 498 128 S790 60, 920 119 S1060 210, 1136 120" stroke="#38BDF8" stroke-opacity="0.22" stroke-width="2"/>
  <path d="M120 325 C305 258, 444 346, 620 282 S835 184, 1100 312" stroke="#A78BFA" stroke-opacity="0.18" stroke-width="2"/>
</g>

<g filter="url(#softGlow)">
  <circle cx="115" cy="126" r="6" fill="#22D3EE"><animate attributeName="opacity" values="0.35;1;0.35" dur="2.8s" repeatCount="indefinite"/></circle>
  <circle cx="360" cy="154" r="5" fill="#60A5FA"><animate attributeName="opacity" values="1;0.3;1" dur="3.2s" repeatCount="indefinite"/></circle>
  <circle cx="620" cy="100" r="7" fill="#38BDF8"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/></circle>
  <circle cx="870" cy="188" r="5" fill="#A78BFA"><animate attributeName="opacity" values="1;0.35;1" dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="1085" cy="151" r="6" fill="#22D3EE"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.9s" repeatCount="indefinite"/></circle>
</g>

<g>
  <circle r="5" fill="#22D3EE" filter="url(#softGlow)">
    <animateMotion dur="7s" repeatCount="indefinite" path="M68 285 C210 225, 285 310, 430 240 S720 135, 845 188 S1040 256, 1130 176"/>
  </circle>
  <circle r="4" fill="#A78BFA" filter="url(#softGlow)">
    <animateMotion dur="8.5s" repeatCount="indefinite" path="M95 126 C225 72, 356 170, 498 128 S790 60, 920 119 S1060 210, 1136 120"/>
  </circle>
</g>

<g transform="translate(64 54)">
  <rect x="0" y="0" width="1072" height="272" rx="24" fill="#020617" fill-opacity="0.58" stroke="#38BDF8" stroke-opacity="0.32"/>
  <rect x="28" y="25" width="154" height="34" rx="17" fill="#0F172A" stroke="#38BDF8" stroke-opacity="0.45"/>
  <circle cx="50" cy="42" r="5" fill="#22C55E"><animate attributeName="opacity" values="0.4;1;0.4" dur="1.7s" repeatCount="indefinite"/></circle>
  <text x="65" y="47" fill="#BAE6FD" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2">LIVE OPS</text>

  <text x="28" y="112" fill="#E0F2FE" font-family="Segoe UI, Arial, sans-serif" font-size="46" font-weight="800" letter-spacing="1">MOHAMED RIZVAN MUTHALIF</text>
  <rect x="30" y="130" width="500" height="4" rx="2" fill="url(#accent)">
    <animate attributeName="width" values="200;500;200" dur="4s" repeatCount="indefinite"/>
  </rect>
  <text x="28" y="176" fill="#93C5FD" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Senior IT Infrastructure Engineer • Microsoft 365 Administrator</text>
  <text x="28" y="213" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18">Network Security • POS Systems • Hospitality IT Operations • Dubai, UAE</text>

  <g transform="translate(715 58)">
    <rect x="0" y="0" width="308" height="172" rx="18" fill="#0B1222" stroke="#475569" stroke-opacity="0.55"/>
    <text x="24" y="39" fill="#38BDF8" font-family="Consolas, Monaco, monospace" font-size="15">$ profile --mission</text>
    <text x="24" y="72" fill="#E2E8F0" font-family="Consolas, Monaco, monospace" font-size="15">standardize()</text>
    <text x="24" y="101" fill="#E2E8F0" font-family="Consolas, Monaco, monospace" font-size="15">secure()</text>
    <text x="24" y="130" fill="#E2E8F0" font-family="Consolas, Monaco, monospace" font-size="15">automate()</text>
    <text x="24" y="159" fill="#E2E8F0" font-family="Consolas, Monaco, monospace" font-size="15">support()</text>
    <rect x="160" y="149" width="10" height="18" fill="#22D3EE"><animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/></rect>
  </g>
</g>

<rect x="1" y="1" width="1198" height="378" rx="28" stroke="url(#accent)" stroke-opacity="0.45" stroke-width="2"/>
</svg>
