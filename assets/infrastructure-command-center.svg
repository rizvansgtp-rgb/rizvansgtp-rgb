<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">Infrastructure Command Center</title>
<desc id="desc">Six operational areas for cloud identity, infrastructure, network security, hospitality IT, IT operations and automation.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360"><stop stop-color="#020617"/><stop offset="1" stop-color="#0F172A"/></linearGradient>
  <linearGradient id="line" x1="0" y1="0" x2="1200" y2="0"><stop stop-color="#06B6D4"/><stop offset="0.5" stop-color="#3B82F6"/><stop offset="1" stop-color="#8B5CF6"/></linearGradient>
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="1200" height="360" rx="22" fill="url(#bg)"/>
<g font-family="Segoe UI, Arial, sans-serif">
  <text x="64" y="52" fill="#E0F2FE" font-size="28" font-weight="800">Infrastructure Command Center</text>
  <text x="64" y="84" fill="#94A3B8" font-size="16">A public-safe portfolio map for enterprise IT operations and automation.</text>
</g>

<g opacity="0.42">
  <path d="M120 215H1080" stroke="url(#line)" stroke-width="2"/>
  <path d="M300 215V150M500 215V278M700 215V150M900 215V278" stroke="#38BDF8" stroke-opacity="0.28" stroke-width="2"/>
</g>
<circle cx="120" cy="215" r="7" fill="#22D3EE" filter="url(#glow)"><animate attributeName="r" values="7;12;7" dur="2.6s" repeatCount="indefinite"/></circle>
<circle cx="300" cy="150" r="7" fill="#60A5FA" filter="url(#glow)"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" repeatCount="indefinite"/></circle>
<circle cx="500" cy="278" r="7" fill="#A78BFA" filter="url(#glow)"><animate attributeName="opacity" values="1;0.4;1" dur="2.5s" repeatCount="indefinite"/></circle>
<circle cx="700" cy="150" r="7" fill="#22C55E" filter="url(#glow)"><animate attributeName="opacity" values="0.45;1;0.45" dur="2.8s" repeatCount="indefinite"/></circle>
<circle cx="900" cy="278" r="7" fill="#F59E0B" filter="url(#glow)"><animate attributeName="opacity" values="1;0.45;1" dur="2.7s" repeatCount="indefinite"/></circle>
<circle cx="1080" cy="215" r="7" fill="#38BDF8" filter="url(#glow)"><animate attributeName="r" values="7;12;7" dur="2.4s" repeatCount="indefinite"/></circle>

<g font-family="Segoe UI, Arial, sans-serif" font-size="15">
  <g transform="translate(52 173)"><rect width="172" height="84" rx="16" fill="#082F49" stroke="#38BDF8" stroke-opacity="0.4"/><text x="18" y="33" fill="#E0F2FE" font-weight="800">Cloud Identity</text><text x="18" y="59" fill="#BAE6FD">M365 • Entra • Intune</text></g>
  <g transform="translate(218 108)"><rect width="184" height="84" rx="16" fill="#102A43" stroke="#60A5FA" stroke-opacity="0.4"/><text x="18" y="33" fill="#E0F2FE" font-weight="800">Infrastructure</text><text x="18" y="59" fill="#BFDBFE">Server • AD • Backup</text></g>
  <g transform="translate(408 240)"><rect width="184" height="84" rx="16" fill="#28134D" stroke="#A78BFA" stroke-opacity="0.42"/><text x="18" y="33" fill="#F3E8FF" font-weight="800">Network Security</text><text x="18" y="59" fill="#DDD6FE">Firewall • VPN • VLAN</text></g>
  <g transform="translate(606 108)"><rect width="190" height="84" rx="16" fill="#052E1A" stroke="#22C55E" stroke-opacity="0.38"/><text x="18" y="33" fill="#DCFCE7" font-weight="800">Hospitality IT</text><text x="18" y="59" fill="#BBF7D0">POS • CCTV • Branch</text></g>
  <g transform="translate(786 240)"><rect width="190" height="84" rx="16" fill="#431407" stroke="#F59E0B" stroke-opacity="0.42"/><text x="18" y="33" fill="#FEF3C7" font-weight="800">IT Operations</text><text x="18" y="59" fill="#FDE68A">SOP • Asset • Vendor</text></g>
  <g transform="translate(990 173)"><rect width="158" height="84" rx="16" fill="#082F49" stroke="#38BDF8" stroke-opacity="0.4"/><text x="18" y="33" fill="#E0F2FE" font-weight="800">Automation</text><text x="18" y="59" fill="#BAE6FD">PowerShell • Docs</text></g>
</g>
</svg>
