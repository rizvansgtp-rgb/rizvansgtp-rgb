<svg width="560" height="170" viewBox="0 0 560 170" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Microsoft 365 Admin Toolkit">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="560" y2="170"><stop stop-color="#020617"/><stop offset="1" stop-color="#0F172A"/></linearGradient>
<linearGradient id="accent" x1="0" y1="0" x2="560" y2="0"><stop stop-color="#0078D4"/><stop offset="1" stop-color="#22D3EE"/></linearGradient>
<filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="560" height="170" rx="18" fill="url(#bg)"/>
<rect x="1" y="1" width="558" height="168" rx="18" stroke="url(#accent)" stroke-opacity="0.55" stroke-width="2"/>
<rect x="0" y="0" width="560" height="5" fill="url(#accent)"/>
<circle cx="66" cy="66" r="34" fill="url(#accent)" opacity="0.18" filter="url(#glow)"/>
<text x="66" y="78" fill="#22D3EE" font-family="Segoe UI Symbol, Segoe UI, Arial, sans-serif" font-size="42" font-weight="800" text-anchor="middle">☁</text>
<text x="120" y="48" fill="#E0F2FE" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">Microsoft 365 Admin Toolkit</text>
<text x="120" y="80" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="15">Exchange • Teams • SharePoint • Entra • Intune</text>
<text x="120" y="111" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="14">Cloud identity governance and admin checklists</text>
<rect x="120" y="126" width="148" height="25" rx="12" fill="#0078D4" fill-opacity="0.18" stroke="#22D3EE" stroke-opacity="0.35"/>
<text x="194" y="144" fill="#E0F2FE" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="800" text-anchor="middle" letter-spacing="1.1">PUBLIC-SAFE</text>
<circle cx="514" cy="42" r="5" fill="#22D3EE" filter="url(#glow)"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/></circle>
<path d="M410 132 C452 104, 487 142, 530 116" stroke="url(#accent)" stroke-opacity="0.35" stroke-width="2"/>
</svg>