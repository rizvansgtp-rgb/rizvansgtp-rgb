<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mohamed Rizvan Muthalif - IT Infrastructure, Microsoft 365, Network Security, POS IT">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a">
        <animate attributeName="stop-color" values="#0f172a;#111827;#0f172a" dur="10s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#172554">
        <animate attributeName="stop-color" values="#172554;#164e63;#172554" dur="10s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#020617">
        <animate attributeName="stop-color" values="#020617;#0b1120;#020617" dur="10s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
    </radialGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#94a3b8" stroke-opacity="0.08" stroke-width="1" />
    </pattern>

    <style>
      .title { font: 800 48px Arial, Helvetica, sans-serif; fill: #f8fafc; letter-spacing: 1px; }
      .subtitle { font: 600 23px Arial, Helvetica, sans-serif; fill: #bae6fd; }
      .mono { font: 700 18px Consolas, Monaco, monospace; fill: #e2e8f0; letter-spacing: 2px; }
      .chip { font: 700 16px Arial, Helvetica, sans-serif; fill: #e0f2fe; }
      .small { font: 600 15px Arial, Helvetica, sans-serif; fill: #cbd5e1; }
      .line { stroke: #38bdf8; stroke-width: 2; stroke-opacity: 0.35; }
      .node { fill: #38bdf8; filter: url(#softGlow); }
      .pulse { fill: #22d3ee; opacity: 0.45; }
    </style>
  </defs>

  <rect width="1280" height="360" rx="28" fill="url(#bg)" />
  <rect width="1280" height="360" rx="28" fill="url(#grid)" />

  <circle cx="1030" cy="80" r="185" fill="url(#glow)">
    <animate attributeName="r" values="160;210;160" dur="7s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.65;0.95;0.65" dur="7s" repeatCount="indefinite" />
  </circle>
  <circle cx="210" cy="295" r="150" fill="url(#glow)" opacity="0.35">
    <animate attributeName="r" values="130;175;130" dur="8s" repeatCount="indefinite" />
  </circle>

  <path class="line" d="M110 247 C255 130 420 145 555 210 S820 310 1070 152" />
  <path class="line" d="M200 96 C360 190 530 85 702 145 S950 230 1135 82" />

  <circle class="node" cx="110" cy="247" r="6" />
  <circle class="node" cx="330" cy="158" r="6" />
  <circle class="node" cx="555" cy="210" r="6" />
  <circle class="node" cx="830" cy="278" r="6" />
  <circle class="node" cx="1070" cy="152" r="6" />
  <circle class="node" cx="200" cy="96" r="5" />
  <circle class="node" cx="495" cy="122" r="5" />
  <circle class="node" cx="702" cy="145" r="5" />
  <circle class="node" cx="935" cy="213" r="5" />
  <circle class="node" cx="1135" cy="82" r="5" />

  <circle r="5" fill="#67e8f9" filter="url(#softGlow)">
    <animateMotion dur="6s" repeatCount="indefinite" path="M110 247 C255 130 420 145 555 210 S820 310 1070 152" />
  </circle>
  <circle r="4" fill="#a78bfa" filter="url(#softGlow)">
    <animateMotion dur="7.5s" repeatCount="indefinite" path="M200 96 C360 190 530 85 702 145 S950 230 1135 82" />
  </circle>

  <g transform="translate(70 72)">
    <text class="small" x="0" y="0">SECURE ENTERPRISE IT OPERATIONS</text>
    <text class="title" x="0" y="58">MOHAMED RIZVAN MUTHALIF</text>
    <text class="subtitle" x="0" y="101">Senior IT Infrastructure Engineer | Microsoft 365 Administrator</text>
    <text class="subtitle" x="0" y="133">Network Security | POS Systems | Hospitality IT</text>

    <g transform="translate(0 175)">
      <rect x="0" y="0" width="156" height="38" rx="19" fill="#0ea5e9" fill-opacity="0.22" stroke="#38bdf8" stroke-opacity="0.6" />
      <text class="chip" x="22" y="25">Microsoft 365</text>
      <rect x="174" y="0" width="116" height="38" rx="19" fill="#22c55e" fill-opacity="0.16" stroke="#86efac" stroke-opacity="0.55" />
      <text class="chip" x="198" y="25">Entra ID</text>
      <rect x="308" y="0" width="104" height="38" rx="19" fill="#f97316" fill-opacity="0.16" stroke="#fdba74" stroke-opacity="0.55" />
      <text class="chip" x="334" y="25">Intune</text>
      <rect x="430" y="0" width="126" height="38" rx="19" fill="#ef4444" fill-opacity="0.15" stroke="#fca5a5" stroke-opacity="0.55" />
      <text class="chip" x="459" y="25">Firewall</text>
      <rect x="574" y="0" width="86" height="38" rx="19" fill="#8b5cf6" fill-opacity="0.17" stroke="#c4b5fd" stroke-opacity="0.55" />
      <text class="chip" x="600" y="25">POS</text>
    </g>

    <g transform="translate(0 258)">
      <text class="mono" x="0" y="0">STANDARDIZE</text>
      <text class="mono" x="170" y="0">|</text>
      <text class="mono" x="205" y="0">SECURE</text>
      <text class="mono" x="322" y="0">|</text>
      <text class="mono" x="357" y="0">AUTOMATE</text>
      <text class="mono" x="510" y="0">|</text>
      <text class="mono" x="545" y="0">SUPPORT</text>
      <rect x="665" y="-21" width="12" height="25" rx="2" fill="#67e8f9">
        <animate attributeName="opacity" values="1;0.15;1" dur="1s" repeatCount="indefinite" />
      </rect>
    </g>
  </g>

  <g opacity="0.85">
    <circle class="pulse" cx="1178" cy="280" r="18">
      <animate attributeName="r" values="8;28;8" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6;0.05;0.6" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle class="pulse" cx="92" cy="54" r="18">
      <animate attributeName="r" values="8;25;8" dur="5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.55;0.08;0.55" dur="5s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
